<!DOCTYPE html>
<html>
<head>
<title>Empathy Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0b0b0b;
    color: white;
    font-size: 13px;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

.overlay {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.title {
    font-family: 'Orbitron', sans-serif;
    font-size: 38px;
    margin-bottom: 25px;
    background: linear-gradient(90deg, #6a5cff, #00ffcc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.container {
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: relative;
    z-index: 1;
}

.card {
    width: 320px;
    padding: 18px;
    border-radius: 16px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    position: relative;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 25px rgba(106,92,255,0.4);
    border-color: rgba(106,92,255,0.5);
}

form {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
}

/* 🔥 ERROR MESSAGE */
.error {
    color: #ff6b6b;
    font-size: 12px;
    margin-bottom: 6px;
    text-align: left;
    width: 100%;
}

/* TEXTAREA */
textarea {
    width: 100%;
    height: 80px;
    padding: 10px;
    border-radius: 10px;
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    transition: 0.3s;
}

textarea:focus {
    outline: none;
    box-shadow: 0 0 10px rgba(106,92,255,0.5);
}

.mic {
    margin: 6px 0;
    cursor: pointer;
    transition: 0.2s;
}

.mic:hover {
    transform: scale(1.2);
}

button {
    margin-top: 10px;
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    background: linear-gradient(90deg, #6a5cff, #9d8bff);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-1px);
    box-shadow: 0 0 15px rgba(106,92,255,0.6);
}

.custom-dropdown {
    width: 100%;
    margin-top: 8px;
    position: relative;
    z-index: 999;
}

.dropdown-display {
    padding: 8px;
    border-radius: 8px;
    background: rgba(0,0,0,0.7);
    border: 1px solid #333;
    cursor: pointer;
    transition: 0.3s;
}

.dropdown-display:hover {
    border-color: #6a5cff;
    box-shadow: 0 0 10px rgba(106,92,255,0.4);
}

.dropdown-list {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    max-height: 150px;
    overflow-y: auto;
    background: #111;
    border-radius: 10px;
    border: 1px solid #333;
    z-index: 9999;
    box-shadow: 0 10px 25px rgba(0,0,0,0.6);
}

.dropdown-list div {
    padding: 8px;
    cursor: pointer;
    transition: 0.2s;
}

.dropdown-list div:hover {
    background: #1a1a1a;
    color: #6a5cff;
}

.container .card:last-child {
    margin-top: 20px;
}

.progress {
    height: 4px;
    background: #222;
    border-radius: 10px;
    margin-top: 6px;
}

.progress-bar {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, #00ffcc, #00ccff);
}

audio {
    width: 100%;
    margin-top: 8px;
    filter: invert(1);
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="overlay">

<div class="title">Empathy Engine</div>

<div class="container">

<div class="card">
<form method="POST" onsubmit="syncVoiceBeforeSubmit(); return validateInput();">

<!-- 🔥 ERROR DISPLAY -->
{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<textarea id="textInput" name="text" placeholder="Type or speak..."></textarea>

<div class="mic" onclick="startSpeech()">🎤</div>

<div class="custom-dropdown">
<div class="dropdown-display" onclick="toggleDropdown()" id="dropdownDisplay">
{{ voices[0].name }}
</div>

<div class="dropdown-list" id="dropdownList">
{% for v in voices %}
<div onclick="selectVoice('{{ v.id }}', '{{ v.name }}')">
{{ v.name }}
</div>
{% endfor %}
</div>

<select name="voice" id="realSelect" style="display:none;">
{% for v in voices %}
<option value="{{ v.id }}" {% if loop.first %}selected{% endif %}>
{{ v.name }}
</option>
{% endfor %}
</select>
</div>

<button type="submit">Generate</button>

</form>
</div>

<div class="card">

{% if emotion %}
<div>
<div>{{ emotion }}</div>
<div>{{ confidence }}%</div>

<div class="progress">
<div class="progress-bar" style="width: {{ confidence }}%"></div>
</div>

{% if audio_file %}
<audio controls autoplay>
    <source src="{{ url_for('static', filename=audio_file) }}">
</audio>
{% endif %}

</div>
{% else %}
<p style="opacity:0.7;">Your output will appear here...</p>
{% endif %}

</div>

</div>

</div>

<script>

function validateInput() {
    const text = document.getElementById("textInput").value.trim();

    if (text === "") {
        alert("⚠️ Please enter some text first");
        return false;
    }

    return true;
}

function startSpeech() {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.start();
    recognition.onresult = e => {
        document.getElementById("textInput").value = e.results[0][0].transcript;
    };
}

function toggleDropdown() {
    const list = document.getElementById("dropdownList");
    list.style.display = list.style.display === "block" ? "none" : "block";
}

function selectVoice(id, name) {
    const display = document.getElementById("dropdownDisplay");
    const select = document.getElementById("realSelect");

    display.innerText = name;

    // 🔥 FORCE UPDATE SELECT VALUE (IMPORTANT)
    select.value = id;

    // 🔥 VERIFY (debug — you can remove later)
    console.log("Selected voice:", id);

    document.getElementById("dropdownList").style.display = "none";
}

function syncVoiceBeforeSubmit() {
    const displayText = document.getElementById("dropdownDisplay").innerText;
    const select = document.getElementById("realSelect");

    // 🔥 Match display text → actual value
    for (let option of select.options) {
        if (option.text === displayText) {
            select.value = option.value;
            break;
        }
    }
}

window.onclick = function(e) {
    if (!e.target.closest('.custom-dropdown')) {
        document.getElementById("dropdownList").style.display = "none";
    }
};

/* Background */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        dx: (Math.random() - 0.5),
        dy: (Math.random() - 0.5)
    });
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = "#888";
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;
    });

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
